      <p>Fill out the form below if you have questions or just want to connect. I check submssions daily and typically respond within 48 hours, thanks!</p>   
        

       <div class="form-container">
        <form actions="#" method="POST">
            <label for="Name">Full Name:</label>
            <input type="text" name="Name" placeholder="Full Name" required>
            <br>

            <label for="Email">Your Email:</label>
            <input type="email" name="Email" placeholder="Your Email" required>
            <br>

            <label for="City">Your City:</label>
            <input type="text" name="City" placeholder="Your city" required>
            <br>

            <label for="Region">Your Region:</label>
            <select name="Region">
                <option selected>Choose:</option>
                <option>Africa</option>
                <option>Asia</option>
                <option>Australia</option>
                <option>Europe</option>
                <option>North America</option>
                <option>Central America</option>
                <option>South America</option>
            </select>
               <br>
            <label for="Message">Your Message</label>
            <textarea name="Messsage" placeholder="Your Message"></textarea>
            <br>

            <input type="SUBMIT" value="SUBMIT">
