<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JUNO-MAN PRO</title>
    <style>
        body {
            margin: 0;
            background: #400c1d;
            color: #89ffef;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        canvas {
            border: 5px solid #ff3183;
            background: #0a0a0a;
            box-shadow: 0 0 40px rgba(255, 49, 131, 0.6);
        }
        .ui { font-size: 1.8rem; margin-bottom: 10px; color: #ff3183; font-weight: bold; text-shadow: 2px 2px #000; }
        #overlay {
            display: none;
            position: absolute;
            background: rgba(10, 10, 10, 0.95);
            padding: 40px;
            border: 4px solid #f11b62;
            text-align: center;
            z-index: 20;
        }
    </style>
</head>
<body>

    <div class="ui">SCORE: <span id="score">0</span> / 1000</div>
    
    <div id="overlay">
        <h2 id="msg" style="color:#f11b62; font-size: 3.5rem; margin: 0;"></h2>
        <p id="subMsg" style="color:#89ffef;"></p>
        <button onclick="location.reload()" style="background:#ff3183; color:white; border:none; padding:15px 30px; cursor:pointer; font-family:inherit; font-size: 1.2rem; margin-top: 20px;">RESTART MISSION</button>
    </div>

    <canvas id="junoCanvas" width="700" height="500"></canvas>

    <div style="margin-top: 15px;">
        <a href="resources.html" style="color: #89ffef; text-decoration: none; opacity: 0.7;">[ EXIT TO SYSTEM ]</a>
    </div>

<script>
    const canvas = document.getElementById('junoCanvas');
    const ctx = canvas.getContext('2d');
    
    let score = 0;
    let gameActive = true;
    let gameStarted = false;

    let player = {
        x: 350, y: 430, radius: 14, speed: 4,
        dirX: 0, dirY: 0,
        nextDirX: 0, nextDirY: 0
    };

    let ghosts = [
        { x: 50, y: 50, speed: 2.2, color: '#ff3183', size: 22 },
        { x: 650, y: 50, speed: 2.0, color: '#f11b62', size: 22 },
        { x: 350, y: 50, speed: 1.8, color: '#7b1a41', size: 22 }
    ];

    const walls = [
        {x: 0, y: 0, w: 700, h: 10}, {x: 0, y: 490, w: 700, h: 10},
        {x: 100, y: 80, w: 200, h: 20}, {x: 400, y: 80, w: 200, h: 20},
        {x: 340, y: 0, w: 20, h: 120}, {x: 100, y: 180, w: 20, h: 150},
        {x: 580, y: 180, w: 20, h: 150}, {x: 200, y: 240, w: 300, h: 20},
        {x: 200, y: 340, w: 100, h: 20}, {x: 400, y: 340, w: 100, h: 20},
        {x: 0, y: 150, w: 60, h: 20}, {x: 640, y: 150, w: 60, h: 20}
    ];

    let dots = [];

    // FIXED: Precise point generation
    function spawnDots() {
        let currentTotal = 0;
        const targetTotal = 1000;

        while (currentTotal < targetTotal) {
            let rx = Math.random() * (canvas.width - 40) + 20;
            let ry = Math.random() * (canvas.height - 40) + 20;
            
            // Determine size based on remaining points needed
            let size, val;
            if (targetTotal - currentTotal >= 50 && Math.random() > 0.7) {
                size = 8; val = 50;
            } else {
                size = 4; val = 10;
            }

            let touching = false;
            walls.forEach(w => {
                if (rx > w.x - 15 && rx < w.x + w.w + 15 && ry > w.y - 15 && ry < w.y + w.h + 15) touching = true;
            });

            if (!touching) {
                dots.push({ x: rx, y: ry, size: size, val: val, collected: false });
                currentTotal += val;
            }
        }
    }

    window.addEventListener('keydown', e => {
        gameStarted = true;
        if (e.code === 'ArrowUp') { player.nextDirX = 0; player.nextDirY = -1; }
        if (e.code === 'ArrowDown') { player.nextDirX = 0; player.nextDirY = 1; }
        if (e.code === 'ArrowLeft') { player.nextDirX = -1; player.nextDirY = 0; }
        if (e.code === 'ArrowRight') { player.nextDirX = 1; player.nextDirY = 0; }
    });

    function checkWall(nx, ny) {
        for (let w of walls) {
            if (nx + 12 > w.x && nx - 12 < w.x + w.w && ny + 12 > w.y && ny - 12 < w.y + w.h) return true;
        }
        return false;
    }

    function update() {
        if (!gameActive || !gameStarted) return;

        if (player.nextDirX !== 0 || player.nextDirY !== 0) {
            if (!checkWall(player.x + player.nextDirX * player.speed, player.y + player.nextDirY * player.speed)) {
                player.dirX = player.nextDirX;
                player.dirY = player.nextDirY;
                player.nextDirX = 0; player.nextDirY = 0;
            }
        }

        let nx = player.x + player.dirX * player.speed;
        let ny = player.y + player.dirY * player.speed;

        if (!checkWall(nx, ny)) {
            player.x = nx; player.y = ny;
        } else {
            player.dirX = 0; player.dirY = 0;
        }

        if (player.x > canvas.width) player.x = 0;
        if (player.x < 0) player.x = canvas.width;
        if (player.y > canvas.height) player.y = 0;
        if (player.y < 0) player.y = canvas.height;

        dots.forEach(d => {
            if (!d.collected && Math.hypot(player.x - d.x, player.y - d.y) < 20) {
                d.collected = true;
                score += d.val;
                document.getElementById('score').innerText = score;
            }
        });

        // Ghost AI with Seperation Logic (to prevent stacking)
        ghosts.forEach((g, i) => {
            let angle = Math.atan2(player.y - g.y, player.x - g.x);
            let gx = g.x + Math.cos(angle) * g.speed;
            let gy = g.y + Math.sin(angle) * g.speed;

            // Simple separation from other ghosts
            ghosts.forEach((other, oi) => {
                if (i !== oi) {
                    let dist = Math.hypot(gx - other.x, gy - other.y);
                    if (dist < 30) {
                        gx -= Math.cos(angle) * 2;
                        gy -= Math.sin(angle) * 2;
                    }
                }
            });

            if (!checkWall(gx, g.y)) g.x = gx;
            if (!checkWall(g.x, gy)) g.y = gy;

            if (Math.hypot(player.x - g.x, player.y - g.y) < 22) {
                gameActive = false;
                showOverlay("SYSTEM CRASHED", "A Ghost intercepted your data stream.");
            }
        });

        if (score >= 1000) {
            gameActive = false;
            showOverlay("UPLINK SUCCESS", "1000/1000 Points Gathered. You win!");
        }
    }

    function showOverlay(title, sub) {
        document.getElementById('msg').innerText = title;
        document.getElementById('subMsg').innerText = sub;
        document.getElementById('overlay').style.display = 'block';
    }

    function draw() {
        ctx.fillStyle = '#0a0a0a';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        walls.forEach(w => {
            ctx.fillStyle = '#400c1d';
            ctx.fillRect(w.x, w.y, w.w, w.h);
            ctx.strokeStyle = '#ff3183';
            ctx.strokeRect(w.x, w.y, w.w, w.h);
        });

        dots.forEach(d => {
            if (!d.collected) {
                ctx.fillStyle = d.size === 8 ? '#f11b62' : '#89ffef';
                ctx.beginPath();
                ctx.arc(d.x, d.y, d.size, 0, Math.PI * 2);
                ctx.fill();
            }
        });

        ctx.fillStyle = '#89ffef';
        ctx.beginPath();
        ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
        ctx.fill();

        ghosts.forEach(g => {
            ctx.fillStyle = g.color;
            ctx.fillRect(g.x - 11, g.y - 11, g.size, g.size);
            ctx.fillStyle = 'white';
            ctx.fillRect(g.x - 6, g.y - 5, 4, 4);
            ctx.fillRect(g.x + 2, g.y - 5, 4, 4);
        });
    }

    function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
    }

    spawnDots();
    loop();
</script>
</body>
</html>
