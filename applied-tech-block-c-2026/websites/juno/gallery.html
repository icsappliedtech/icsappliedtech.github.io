<!doctype html>
<html lang="eng">
<head>
  <meta charset="utf-8">
  <title>Juno: Gallery</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-sub">
   <div class="nav-container">
    <div class="navbar">
      <h6><a href="index.html">JUNO DORE</a></h6>
    </div>
   </div> 

   <div class="subpage-container">
    <h1>Gallery</h1>
    
    <div class="gallery">
        <input type="radio" name="gallery-group" id="img-1" checked>
        <input type="radio" name="gallery-group" id="img-2">
        <input type="radio" name="gallery-group" id="img-3">
        <input type="radio" name="gallery-group" id="img-4">
        <input type="radio" name="gallery-group" id="img-5">

        <div class="image-wrapper image-1"><img src="img/pic1.JPEG" alt="Gallery 1"></div>
        <div class="image-wrapper image-2"><img src="img/pic2.JPEG" alt="Gallery 2"></div>
        <div class="image-wrapper image-3"><img src="img/pic3.jpg" alt="Gallery 3"></div>
        <div class="image-wrapper image-4"><img src="img/pic4.jpg" alt="Gallery 4"></div>
        <div class="image-wrapper image-5"><img src="img/pic5.jpg" alt="Gallery 5"></div>

        <div class="gallery-nav">
          <label for="img-1"></label>
          <label for="img-2"></label>
          <label for="img-3"></label>
          <label for="img-4"></label>
          <label for="img-5"></label>
        </div>

        <label for="img-2" class="next-control next-control-1">&#8250;</label>
        <label for="img-3" class="next-control next-control-2">&#8250;</label>
        <label for="img-4" class="next-control next-control-3">&#8250;</label>
        <label for="img-5" class="next-control next-control-4">&#8250;</label>
        <label for="img-1" class="next-control next-control-5">&#8250;</label>
    </div>

    <hr>
    <div class="button-group">
        <a href="about.html" class="action-btn">GO BACK</a>
    </div>
   </div>

   <div class="footer-container">
        <div class="footer-content">©2026 All Rights Reserved</div>
   </div>
</body>
</html>
