   <script>
    const canvas = document.getElementById('sakura-canvas');
    const ctx = canvas.getContext('2d');

    let width, height, petals = [];
    const petalCount = 35; 

    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }

    window.addEventListener('resize', resize);
    resize();

    class Petal {
      constructor() {
        this.x = Math.random() * width;
        this.y = Math.random() * height;
        this.size = Math.random() * 5 + 5;
        this.speed = Math.random() * 1 + 0.5;
        this.angle = Math.random() * Math.PI * 2;
        this.spin = Math.random() * 0.02 - 0.01;
      }

      update() {
        this.y += this.speed;
        this.x += Math.sin(this.angle) * 0.5;
        this.angle += this.spin;
        if (this.y > height) {
          this.y = -20;
          this.x = Math.random() * width;
        }
      }

      draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);
        ctx.beginPath();
        ctx.ellipse(0, 0, this.size, this.size / 1.5, 0, 0, Math.PI * 2);
        ctx.fillStyle = '#ffb7c5'; 
        ctx.fill();
        ctx.restore();
      }
    }

    for (let i = 0; i < petalCount; i++) petals.push(new Petal());

    // ENHANCED BRANCH FUNCTION
    function drawBranch(x, y, len, angle, sway, depth) {
      ctx.beginPath();
      ctx.save();
      ctx.strokeStyle = "#3a2321";
      ctx.lineWidth = len / 10;
      ctx.translate(x, y);
      ctx.rotate(angle + sway);
      ctx.moveTo(0, 0);
      ctx.lineTo(0, -len);
      ctx.stroke();

      if (depth <= 0) {
        // Draw flower clusters
        ctx.beginPath();
        ctx.arc(0, -len, 6, 0, Math.PI * 2);
        ctx.fillStyle = "#ffc0cb";
        ctx.fill();
        // Add a secondary little bud
        ctx.arc(4, -len - 2, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
        return;
      }

      // Spread out logic: asymmetrical branches look more real
      // Branch 1
      drawBranch(0, -len, len * 0.8, 0.45, sway * 1.2, depth - 1);
      // Branch 2
      drawBranch(0, -len, len * 0.6, -0.55, sway * 0.8, depth - 1);
      
      ctx.restore();
    }

    function animate() {
      ctx.clearRect(0, 0, width, height);
      
      let time = Date.now() * 0.0008;
      let sway = Math.sin(time) * 0.04;

      // DRAW BRANCHES WITH DEPTH LIMIT (Prevents mushing)
      // Left branch: shallower depth but longer base
      drawBranch(-20, 110, 140, Math.PI * 0.6, sway, 4);
      
      // Right branch: reaching more horizontally
      drawBranch(width + 20, 120, 110, Math.PI * 1.4, sway, 4);

      petals.forEach(p => {
        p.update();
        p.draw();
      });

      requestAnimationFrame(animate);
    }

    animate();
   </script>
</body>
