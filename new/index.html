<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mr Jason Code</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    /* ============================================================
       THEME TOKENS — Chalk + Deep Navy (light) / Deep Navy (dark)
    ============================================================ */
    :root, [data-theme="light"] {
      --bg:          #FAFBFC;
      --surface:     #FFFFFF;
      --surface-2:   #EEF1F5;
      --border:      #D9DFE8;
      --border-dark: #BCC5D3;
      --text:        #0B1320;
      --text-2:      #3D4F68;
      --text-3:      #8496AE;
      --accent:      #1A3A6B;
      --accent-dark: #0F2347;
      --accent-light:#E8EFF8;
      --accent-mid:  #C5D5EA;
      --yellow:      #FFCB47;
      --yellow-light:#FFF6D6;
      --yellow-dark: #7A5800;
    }

    [data-theme="dark"] {
      --bg:          #0B1320;
      --surface:     #111D2E;
      --surface-2:   #1A2C42;
      --border:      #1E3250;
      --border-dark: #2A4468;
      --text:        #E8EDF5;
      --text-2:      #9AAEC8;
      --text-3:      #4D6884;
      --accent:      #4D87D6;
      --accent-dark: #3A70BE;
      --accent-light:#0F2347;
      --accent-mid:  #1A3A6B;
      --yellow:      #FFCB47;
      --yellow-light:#2A2000;
      --yellow-dark: #FFCB47;
    }

    /* ============================================================
       RESET & BASE
    ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body {
      font-family: 'Noto Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
      transition: background 0.25s ease, color 0.25s ease;
      display: flex;
      flex-direction: column;
    }
    #app { flex: 1; }
    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; font-family: inherit; border: none; background: none; }
    svg { display: block; flex-shrink: 0; }

    /* ============================================================
       LAYOUT
    ============================================================ */
    .container { max-width: 1140px; margin: 0 auto; padding: 0 28px; }

    /* ============================================================
       TYPOGRAPHY HELPERS
    ============================================================ */
    .font-display { font-family: 'Inter', sans-serif; }
    .muted  { color: var(--text-2); }
    .subtle { color: var(--text-3); }

    /* ============================================================
       TAGS / BADGES
    ============================================================ */
    .tag {
      display: inline-flex;
      align-items: center;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 100px;
      line-height: 1.6;
      white-space: nowrap;
    }
    .tag-navy   { background: var(--accent-light); color: var(--accent); }
    .tag-yellow { background: var(--yellow-light);  color: var(--yellow-dark); }
    .tag-slate  { background: var(--surface-2);     color: var(--text-2); }
    [data-theme="dark"] .tag-yellow { color: var(--yellow); }

    /* ============================================================
       BUTTONS
    ============================================================ */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 600;
      padding: 11px 22px;
      border-radius: 10px;
      transition: all 0.18s ease;
      white-space: nowrap;
      border: 2px solid transparent;
    }
    .btn-primary { background: var(--text); color: var(--bg); border-color: var(--text); }
    .btn-primary:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn-outline { background: transparent; color: var(--text-2); border-color: var(--border-dark); }
    .btn-outline:hover { border-color: var(--text); color: var(--text); }
    .btn-accent { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-accent:hover { background: var(--accent-dark); border-color: var(--accent-dark); }

    /* ============================================================
       CARD
    ============================================================ */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      transition: box-shadow 0.18s ease, transform 0.18s ease, border-color 0.18s ease;
    }
    .card:hover {
      box-shadow: 0 6px 24px rgba(11,19,32,0.10);
      transform: translateY(-2px);
      border-color: var(--border-dark);
    }
    [data-theme="dark"] .card:hover { box-shadow: 0 6px 24px rgba(0,0,0,0.35); }
    .card-hover-accent:hover { border-color: var(--accent-mid); }

    /* ============================================================
       SECTION EYEBROW
    ============================================================ */
    .section-eyebrow {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 10px;
    }
    .section-eyebrow::before {
      content: '';
      display: inline-block;
      width: 18px; height: 2px;
      background: var(--yellow);
      border-radius: 2px;
    }

    /* ============================================================
       DIVIDER
    ============================================================ */
    hr.divider { border: none; border-top: 1px solid var(--border); margin: 0; }

    /* ============================================================
       FADE IN
    ============================================================ */
    .fade-in { animation: fadeUp 0.3s ease both; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ============================================================
       LOADING STATE
    ============================================================ */
    .loading-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      color: var(--text-3);
      font-size: 14px;
      gap: 10px;
    }
    .loading-dot {
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 1.2s ease-in-out infinite;
    }
    .loading-dot:nth-child(2) { animation-delay: 0.2s; }
    .loading-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%, 80%, 100% { opacity: 0.2; } 40% { opacity: 1; } }

    /* ============================================================
       ANNOUNCEMENT BAR
    ============================================================ */
    .announcement-bar {
      background: var(--accent);
      color: #fff;
      text-align: center;
      padding: 9px 20px;
      font-size: 13px;
      font-weight: 500;
    }
    [data-theme="dark"] .announcement-bar { background: var(--surface-2); color: var(--text); }
    .announcement-bar a {
      color: var(--yellow);
      margin-left: 8px;
      font-weight: 600;
      text-decoration: underline;
    }
    .announcement-bar a:hover { opacity: 0.85; }

    /* ============================================================
       NAV
    ============================================================ */
    .nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      transition: background 0.25s ease, border-color 0.25s ease;
    }
    .nav-inner {
      max-width: 1140px;
      margin: 0 auto;
      padding: 0 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      gap: 16px;
    }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Inter', sans-serif;
      font-weight: 800;
      font-size: 17px;
      letter-spacing: -0.02em;
      color: var(--text);
      transition: color 0.18s ease;
      flex-shrink: 0;
    }
    .nav-logo:hover { color: var(--accent); }
    .nav-logo-mark {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 800;
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.02em;
      color: #fff;
      flex-shrink: 0;
      transition: background 0.25s ease;
      user-select: none;
    }
    .nav-links { display: flex; align-items: center; gap: 2px; list-style: none; }
    .nav-links button {
      font-size: 14px; font-weight: 500;
      color: var(--text-2);
      padding: 7px 13px;
      border-radius: 8px;
      transition: background 0.18s ease, color 0.18s ease;
    }
    .nav-links button:hover { background: var(--surface-2); color: var(--text); }
    .nav-links button.nav-active {
      background: var(--accent-light);
      color: var(--accent);
      font-weight: 600;
    }
    .theme-toggle {
      width: 36px; height: 36px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-2);
      background: var(--surface-2);
      border: 1px solid var(--border);
      transition: all 0.18s ease;
      flex-shrink: 0;
    }
    .theme-toggle:hover { border-color: var(--border-dark); color: var(--text); }
    .nav-contact {
      font-size: 13px; font-weight: 600;
      color: var(--text-2);
      background: var(--surface-2);
      border: 1px solid var(--border-dark);
      padding: 8px 16px;
      border-radius: 10px;
      transition: all 0.18s ease;
      white-space: nowrap;
    }
    .nav-contact:hover { background: var(--text); color: var(--bg); border-color: var(--text); }
    .nav-mobile-btn {
      display: none; padding: 8px;
      border-radius: 8px; color: var(--text);
    }
    .nav-mobile-btn:hover { background: var(--surface-2); }
    .mobile-nav {
      display: none;
      border-top: 1px solid var(--border);
      background: var(--surface);
      padding: 10px 16px 14px;
      flex-direction: column; gap: 2px;
    }
    .mobile-nav.open { display: flex; }
    .mobile-nav button {
      text-align: left; font-size: 14px; font-weight: 500;
      color: var(--text-2); padding: 10px 12px;
      border-radius: 8px;
      transition: background 0.18s ease, color 0.18s ease;
    }
    .mobile-nav button:hover { background: var(--surface-2); color: var(--text); }

    /* ============================================================
       HOME — HERO
    ============================================================ */
    .hero { padding: 72px 0 56px; }
    .hero-eyebrow {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 12px; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--text-3); margin-bottom: 20px;
    }
    .hero-eyebrow::before {
      content: '';
      display: inline-block;
      width: 6px; height: 6px;
      background: var(--yellow); border-radius: 50%;
    }
    .hero h1 {
      font-family: 'Inter', sans-serif;
      font-weight: 800;
      font-size: clamp(44px, 7vw, 72px);
      line-height: 1.02;
      letter-spacing: -0.025em;
      color: var(--text);
      margin-bottom: 22px;
    }
    /* Global accent highlight — used in hero h1, about h1, etc. */
    .hl { color: var(--accent); }
    .hero-body {
      font-size: 17px; color: var(--text-2);
      line-height: 1.7; max-width: 560px; margin-bottom: 36px;
    }
    .hero-cta { display: flex; gap: 12px; flex-wrap: wrap; }

    /* ============================================================
       HOME — DEPT CARDS
    ============================================================ */
    .grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    .dept-card {
      padding: 28px;
      display: flex; flex-direction: column; gap: 14px;
      cursor: pointer;
    }
    .dept-card-icon {
      width: 50px; height: 50px;
      background: var(--surface-2);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-2);
      transition: background 0.18s ease, color 0.18s ease;
    }
    .dept-card:hover .dept-card-icon { background: var(--accent-light); color: var(--accent); }
    .dept-card h3 { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 20px; color: var(--text); }
    .dept-card p { font-size: 14px; color: var(--text-2); line-height: 1.6; flex: 1; }
    .dept-card-link { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600; color: var(--accent); }

    .quick-link-card {
      padding: 22px 24px;
      display: flex; align-items: center; gap: 18px;
      cursor: pointer;
    }
    .quick-link-icon {
      width: 46px; height: 46px;
      background: var(--surface-2); border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-2); flex-shrink: 0;
      transition: background 0.18s ease, color 0.18s ease;
    }
    .quick-link-card:hover .quick-link-icon { background: var(--accent-light); color: var(--accent); }
    .quick-link-card h4 { font-size: 15px; font-weight: 600; margin-bottom: 3px; }
    .quick-link-card p  { font-size: 13px; color: var(--text-2); }

    /* ============================================================
       PAGE HEADER
    ============================================================ */
    .page-header { padding: 52px 0 40px; }
    .page-header h1 {
      font-family: 'Inter', sans-serif;
      font-weight: 800;
      font-size: clamp(34px, 5vw, 52px);
      letter-spacing: -0.025em;
      margin-bottom: 12px;
    }
    .page-header p { font-size: 16px; color: var(--text-2); max-width: 520px; }

    /* ============================================================
       STUDENT WORK — HUB PAGE
    ============================================================ */
    .sw-hub-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      padding-bottom: 72px;
      align-items: start;
    }

    /* Department card on the hub */
    .sw-dept-card {
      border-radius: 16px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .sw-dept-header {
      padding: 24px 24px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      border-bottom: 1px solid var(--border);
    }
    .sw-dept-header-icon {
      width: 44px; height: 44px;
      background: var(--surface-2);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-2);
      flex-shrink: 0;
    }
    .sw-dept-header h3 {
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 16px;
      color: var(--text);
      margin-bottom: 2px;
    }
    .sw-dept-header p { font-size: 12px; color: var(--text-3); }

    /* Semester list inside hub card */
    .sw-sem-list { padding: 10px 12px; flex: 1; }
    .sw-sem-btn {
      width: 100%; text-align: left;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px; font-weight: 500;
      color: var(--text-2);
      display: flex; justify-content: space-between; align-items: center;
      transition: background 0.18s ease, color 0.18s ease;
      margin-bottom: 2px;
    }
    .sw-sem-btn:hover { background: var(--accent-light); color: var(--accent); }
    .sw-sem-btn.current-sem {
      background: var(--accent-light);
      color: var(--accent);
      font-weight: 600;
    }
    .sw-sem-meta {
      display: flex; align-items: center; gap: 6px;
    }
    .sw-sem-count {
      font-size: 11px;
      color: var(--text-3);
      background: var(--surface-2);
      padding: 1px 7px;
      border-radius: 100px;
    }
    .sw-sem-btn.current-sem .sw-sem-count {
      background: var(--accent-mid);
      color: var(--accent);
    }
    .sw-dept-footer { padding: 12px 16px 16px; border-top: 1px solid var(--border); }
    .sw-dept-footer button {
      width: 100%;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px; font-weight: 600;
      background: var(--text); color: var(--bg);
      transition: background 0.18s ease;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .sw-dept-footer button:hover { background: var(--accent); }

    /* Total project count badge */
    .sw-total-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 600;
      color: var(--text-3);
      margin-top: 2px;
    }

    /* ============================================================
       STUDENT WORK — CLASS PAGE (sidebar layout)
    ============================================================ */
    .class-page-layout {
      display: flex; gap: 32px;
      padding: 40px 0 72px;
      align-items: flex-start;
    }
    .sidebar { width: 230px; flex-shrink: 0; position: sticky; top: 80px; }
    .sidebar-back {
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; font-weight: 500;
      color: var(--text-3);
      margin-bottom: 24px;
      transition: color 0.18s ease;
    }
    .sidebar-back:hover { color: var(--accent); }
    .sidebar-section-label {
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text-3);
      padding: 0 10px; margin-bottom: 6px;
    }
    .sidebar-link {
      display: flex; align-items: center; gap: 8px;
      width: 100%; text-align: left;
      padding: 9px 10px;
      border-radius: 8px;
      font-size: 14px; font-weight: 500;
      color: var(--text-2);
      transition: background 0.18s ease, color 0.18s ease;
      margin-bottom: 2px;
    }
    .sidebar-link:hover { background: var(--accent-light); color: var(--accent); }
    .sidebar-link.active { background: var(--accent-light); color: var(--accent); font-weight: 600; }
    .sidebar-link .count { margin-left: auto; font-size: 11px; color: var(--text-3); }
    .sidebar-link.active .count { color: var(--accent); opacity: 0.7; }
    .sidebar-dept-icon {
      width: 22px; height: 22px;
      display: flex; align-items: center; justify-content: center;
      color: currentColor; flex-shrink: 0;
    }

    /* Current semester indicator dot */
    .sem-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--yellow);
      flex-shrink: 0;
    }

    .class-main { flex: 1; min-width: 0; }
    .class-main-header { margin-bottom: 32px; }
    .class-main-header .tags { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
    .class-main-header h1 {
      font-family: 'Inter', sans-serif;
      font-weight: 800;
      font-size: clamp(28px, 4vw, 40px);
      letter-spacing: -0.02em; margin-bottom: 6px;
    }
    .section-heading {
      display: flex; align-items: center; gap: 10px;
      font-size: 16px; font-weight: 600;
      color: var(--text); margin-bottom: 16px;
    }
    .section-heading-bar { width: 4px; height: 20px; border-radius: 2px; flex-shrink: 0; }

    /* Project grid */
    .project-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 16px; margin-bottom: 40px;
    }
    .project-card { display: flex; flex-direction: column; border-radius: 16px; overflow: hidden; cursor: pointer; }
    .project-thumb {
      width: 100%; aspect-ratio: 16/10;
      background: var(--surface-2);
      display: flex; align-items: center; justify-content: center;
      color: var(--text-3);
      position: relative; overflow: hidden;
    }
    .project-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .project-thumb::after {
      content: ''; position: absolute; inset: 0;
      background: var(--accent); opacity: 0;
      transition: opacity 0.18s ease;
    }
    .project-card:hover .project-thumb::after { opacity: 0.06; }
    .project-body { padding: 14px; flex: 1; display: flex; flex-direction: column; gap: 4px; }
    .project-type { font-size: 10px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text-3); }
    .project-title { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.35; }
    .project-student { font-size: 12px; color: var(--accent); font-weight: 500; }
    .project-desc { font-size: 12px; color: var(--text-2); line-height: 1.5; margin-top: 3px; }
    .project-link-badge {
      margin-top: 6px;
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11px; font-weight: 600; color: var(--accent);
    }

    /* Submission grid */
    .submission-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px;
      margin-bottom: 48px;
    }
    .submission-card {
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: box-shadow 0.18s ease, transform 0.18s ease, border-color 0.18s ease;
    }
    .submission-card:hover {
      box-shadow: 0 6px 24px rgba(11,19,32,0.10);
      transform: translateY(-2px);
    }
    [data-theme="dark"] .submission-card:hover { box-shadow: 0 6px 24px rgba(0,0,0,0.35); }
    .submission-thumb {
      width: 100%; aspect-ratio: 16/10;
      background: var(--surface-2);
      display: flex; align-items: center; justify-content: center;
      color: var(--text-3); position: relative; overflow: hidden;
    }
    .submission-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .submission-body {
      padding: 12px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 14px 14px;
      flex: 1; display: flex; flex-direction: column; gap: 3px;
    }
    .submission-student { font-size: 11px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: var(--text-3); }
    .submission-title   { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.3; }
    .submission-link    { margin-top: 6px; display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; color: var(--accent); }
    .submission-no-link { margin-top: 6px; font-size: 11px; color: var(--text-3); }

    /* Link grid (semester links) */
    .link-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 10px; }
    .link-card {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px; border-radius: 12px; cursor: pointer;
    }
    .link-icon {
      width: 40px; height: 40px;
      background: var(--surface-2); border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-2); flex-shrink: 0;
      transition: background 0.18s ease, color 0.18s ease;
    }
    .link-card:hover .link-icon { background: var(--accent-light); color: var(--accent); }
    .link-card h4 { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
    .link-card p  { font-size: 12px; color: var(--text-2); }

    /* ============================================================
       SANDBOX
    ============================================================ */
    .sandbox-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 16px; }
    .sandbox-card { padding: 24px; display: flex; flex-direction: column; gap: 12px; cursor: pointer; }
    .sandbox-icon {
      width: 48px; height: 48px; background: var(--surface-2);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-2);
      transition: background 0.18s ease, color 0.18s ease;
    }
    .sandbox-card:hover .sandbox-icon { background: var(--accent-light); color: var(--accent); }
    .sandbox-card-top { display: flex; align-items: flex-start; justify-content: space-between; }
    .sandbox-card h3 { font-size: 15px; font-weight: 600; }
    .sandbox-card p  { font-size: 13px; color: var(--text-2); line-height: 1.55; flex: 1; }
    .sandbox-open { font-size: 12px; font-weight: 600; color: var(--accent); display: flex; align-items: center; gap: 4px; }

    /* ============================================================
       RESOURCES
    ============================================================ */
    .resources-section { margin-bottom: 52px; }
    .resources-section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
    .resources-section-header h2 {
      font-family: 'Inter', sans-serif;
      font-weight: 700; font-size: 22px;
    }
    .resources-section-icon {
      width: 36px; height: 36px;
      background: var(--surface-2); border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-2);
    }
    .resources-desc { font-size: 14px; color: var(--text-2); margin-bottom: 18px; }
    .resource-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 10px; }
    .resource-card {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px; border-radius: 12px; cursor: pointer;
    }
    .resource-icon {
      width: 44px; height: 44px; background: var(--surface-2);
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
      color: var(--text-2); flex-shrink: 0;
      transition: background 0.18s ease, color 0.18s ease;
    }
    .resource-card:hover .resource-icon { background: var(--accent-light); color: var(--accent); }
    .resource-card h4 { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
    .resource-card p  { font-size: 12px; color: var(--text-2); }

    /* ============================================================
       ABOUT
    ============================================================ */
    .about-layout { max-width: 680px; padding: 52px 0 72px; }
    .about-layout h1 {
      font-family: 'Inter', sans-serif;
      font-weight: 800;
      font-size: clamp(34px, 5vw, 50px);
      letter-spacing: -0.025em; line-height: 1.05; margin-bottom: 28px;

    .about-layout h1 .hl { color: var(--accent); }

    .about-body p { font-size: 15px; color: var(--text-2); line-height: 1.75; }
    .about-classes { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 40px; }
    .about-class-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 20px;
    }
    .about-class-icon {
      width: 36px; height: 36px;

    ============================================================ */

  const svg = ICONS[name] || ICONS.star;
  if (!size) return svg;
  return svg.replace(/width="\d+"/, `width="${size}"`).replace(/height="\d+"/, `height="${size}"`);

/* ====================================================================
   DATA — loaded async from /data/*.json
   studentwork/index.json loads on boot (metadata only).
   Individual semester files (e.g. at-sem2-2026.json) load on demand
   and are cached in DATA.semesterCache so they're only fetched once.
==================================================================== */
let DATA = {};

async function loadAllData() {
  const coreFiles = ['home', 'sandbox', 'resources', 'about'];
  try {
    const results = await Promise.all(
      coreFiles.map(f =>
        fetch(`data/${f}.json`)
          .then(r => { if (!r.ok) throw new Error(`Failed: data/${f}.json`); return r.json(); })
      )
    );
    coreFiles.forEach((f, i) => { DATA[f] = results[i]; });

    // Load studentwork index (metadata only — no projects)
    const swIndex = await fetch('data/studentwork/index.json')
      .then(r => { if (!r.ok) throw new Error('Failed: data/studentwork/index.json'); return r.json(); });
    DATA.studentwork = swIndex;
    DATA.semesterCache = {};

  } catch (err) {
    console.error('Data load error:', err);
    document.getElementById('app').innerHTML =
      `<div style="padding:80px 28px;text-align:center;color:var(--text-2);">
        <p style="font-size:15px;">Could not load site data. Make sure you're serving this from a web server (not file://).</p>
        <p style="font-size:13px;margin-top:8px;color:var(--text-3);">Try: <code>npx serve .</code> or upload to GitHub Pages.</p>
       </div>`;
    return false;
  }
  return true;
}

async function loadSemester(semId) {
  if (DATA.semesterCache[semId]) return DATA.semesterCache[semId];
  const data = await fetch(`data/studentwork/${semId}.json`)
    .then(r => { if (!r.ok) throw new Error(`Failed: ${semId}.json`); return r.json(); });
  DATA.semesterCache[semId] = data;
  return data;
}

const themeBtn = document.getElementById('theme-btn');

function setThemeIcon(isDark) {
  themeBtn.innerHTML = isDark ? ICONS.moon : ICONS.sun;
}

function toggleTheme() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
  setThemeIcon(!isDark);
  localStorage.setItem('mjc-theme', isDark ? 'light' : 'dark');
}

(function initTheme() {
  const saved = localStorage.getItem('mjc-theme');
  if (saved === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
})();

/* ====================================================================
   ROUTER
==================================================================== */
let currentRoute    = 'home';
let activeDeptId    = null;   // active department
let activeSemId     = null;   // active semester
let activeProjectId = null;   // active project within a semester

function navigate(route, deptId, semId, projectId) {
  currentRoute = route;
  if (deptId    !== undefined) activeDeptId    = deptId;
  if (semId     !== undefined) activeSemId     = semId;
  if (projectId !== undefined) activeProjectId = projectId;

  // Update nav active states
  document.querySelectorAll('[data-nav]').forEach(btn => {
    btn.classList.remove('nav-active');
    const match = (route === 'class-page' || route === 'project-page') ? 'student-work' : route;
    if (btn.dataset.nav === match) btn.classList.add('nav-active');
  });

  renderAsync();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ====================================================================
   RENDER DISPATCHER — async for lazy-loaded semester/project data
==================================================================== */
async function renderAsync() {
  const app = document.getElementById('app');
  const spinner = `<div class="loading-screen"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div>`;

  if (currentRoute === 'class-page' || currentRoute === 'project-page') {
    app.innerHTML = spinner;
    const dept = DATA.studentwork.departments.find(d => d.id === activeDeptId) || DATA.studentwork.departments[0];
    const semMeta = activeSemId
      ? dept.semesters.find(s => s.id === activeSemId)
      : (dept.semesters.find(s => s.current) || dept.semesters[0]);
    if (!semMeta) { app.innerHTML = `<div class="container" style="padding:60px 0;color:var(--text-3);">No semester found.</div>`; return; }
    try {
      const semData = await loadSemester(semMeta.id);
      if (currentRoute === 'project-page') {
        const project = semData.projects.find(p => p.id === activeProjectId) || semData.projects[0];
        app.innerHTML = `<div class="fade-in">${renderProjectPage(dept, semMeta, project)}</div>`;
      } else {
        app.innerHTML = `<div class="fade-in">${renderClassPage(dept, semMeta, semData)}</div>`;
      }
    } catch (err) {
      app.innerHTML = `<div class="container" style="padding:60px 0;color:var(--text-3);">Could not load semester data.</div>`;
    }
    return;
  }

  const views = {
    'home':         renderHome,
    'student-work': renderStudentWork,
    'sandbox':      renderSandbox,
    'resources':    renderResources,
    'about':        renderAbout,
  };
  const viewFn = views[currentRoute] || renderHome;
  app.innerHTML = `<div class="fade-in">${viewFn()}</div>`;
}

/* ====================================================================
   HOME
==================================================================== */
function renderHome() {
  const { announcement, hero, quickLinks } = DATA.home;
  const { departments } = DATA.studentwork;

  // Announcement bar
  const bar = document.getElementById('announcement-bar');
  if (announcement && announcement.active) {
    bar.style.display = '';
    bar.innerHTML = `${announcement.message}
      <a href="#" onclick="navigate('${announcement.linkTarget}'); return false;">${announcement.linkText}</a>`;
  } else {
    bar.style.display = 'none';
  }

  const headline = hero.headline.map((line, i) =>
    i === hero.accentLineIndex ? `<span class="hl">${line}</span>` : line
  ).join('<br>');

  const deptCards = departments.map(dept => {
    const semCount = dept.semesters.length;
    return `
    <div class="card card-hover-accent dept-card" onclick="navigate('class-page','${dept.id}',null)">
      <div class="dept-card-icon">${icon(dept.icon)}</div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
        <h3>${dept.label}</h3>
        <span class="tag ${dept.tagClass}">${semCount} sem${semCount !== 1 ? 's' : ''}</span>
      </div>
      <p>${dept.description}</p>
      <div class="dept-card-link">View work ${ICONS.arrow}</div>
    </div>`;
  }).join('');

  const quickLinkCards = quickLinks.map(ql => `
    <div class="card quick-link-card card-hover-accent" onclick="navigate('${ql.target}')">
      <div class="quick-link-icon">${icon(ql.icon)}</div>
      <div>
        <h4>${ql.title}</h4>
        <p>${ql.desc}</p>
      </div>
    </div>`).join('');

  return `
  <div class="container">
    <section class="hero">
      <p class="hero-eyebrow">${hero.eyebrow}</p>
      <h1>${headline}</h1>
      <p class="hero-body">${hero.body}</p>
      <div class="hero-cta">
        <button class="btn btn-primary" onclick="navigate('student-work')">Browse Student Work ${ICONS.arrow}</button>
        <button class="btn btn-outline" onclick="navigate('resources')">View Resources</button>
      </div>
    </section>
  </div>

  <hr class="divider"/>

  <div class="container">
    <section style="padding:48px 0 56px;">
      <p class="section-eyebrow">Three disciplines</p>
      <div class="grid-3">${deptCards}</div>
    </section>
  </div>

  <hr class="divider"/>

  <div class="container">
    <section style="padding:48px 0 72px;">
      <p class="section-eyebrow">Quick access</p>
      <div class="grid-2">${quickLinkCards}</div>
    </section>
  </div>`;
}

/* ====================================================================
   STUDENT WORK — HUB
   Shows all departments, with each semester listed and project counts.
==================================================================== */
function renderStudentWork() {
  const { departments } = DATA.studentwork;

  const deptCards = departments.map(dept => {
    const totalProjects = dept.semesters.reduce((acc, s) => acc + s.projectCount, 0);

    const semList = dept.semesters.map(sem => {
      const isCurrent = sem.current;
      return `
      <button class="sw-sem-btn ${isCurrent ? 'current-sem' : ''}"
              onclick="navigate('class-page','${dept.id}','${sem.id}')">
        <span style="display:flex;align-items:center;gap:6px;">
          ${isCurrent ? '<span class="sem-dot"></span>' : ''}
          ${sem.label}
        </span>
        <span class="sw-sem-meta">
          <span class="sw-sem-count">${sem.projectCount} projects</span>
          ${ICONS.arrow}
        </span>
      </button>`;
    }).join('');

    return `
    <div class="card sw-dept-card">
      <div class="sw-dept-header">
        <div class="sw-dept-header-icon">${icon(dept.icon)}</div>
        <div>
          <h3>${dept.label}</h3>
          <p>${totalProjects} projects across ${dept.semesters.length} semester${dept.semesters.length !== 1 ? 's' : ''}</p>
        </div>
      </div>
      <div class="sw-sem-list">${semList}</div>
      <div class="sw-dept-footer">
        <button onclick="navigate('class-page','${dept.id}',null)">
          All ${dept.shortLabel} Work ${ICONS.arrow}
        </button>
      </div>
    </div>`;
  }).join('');

  return `
  <div class="container">
    <div class="page-header">
      <p class="section-eyebrow">Browse by discipline</p>
      <h1>Student Work</h1>
      <p class="muted">Select a class and semester to browse projects. The yellow dot marks the current semester.</p>
    </div>
    <div class="sw-hub-grid">${deptCards}</div>
  </div>`;
}

/* ====================================================================
   CLASS PAGE — receives dept metadata, semMeta, and lazy-loaded semData
==================================================================== */
function renderClassPage(dept, semMeta, semData) {
  const { departments } = DATA.studentwork;

  // Sidebar: department switcher
  const deptLinks = departments.map(d => `
    <button class="sidebar-link ${d.id === dept.id ? 'active' : ''}"
            onclick="navigate('class-page','${d.id}',null)">
      <span class="sidebar-dept-icon">${icon(d.icon, 18)}</span>
      ${d.shortLabel}
    </button>`).join('');

  // Sidebar: semester switcher (uses projectCount from index.json metadata)
  const sidebarSemLinks = dept.semesters.map(s => `
    <button class="sidebar-link ${s.id === semMeta.id ? 'active' : ''}"
            onclick="navigate('class-page','${dept.id}','${s.id}')">
      ${s.current ? '<span class="sem-dot"></span>' : ''}
      ${s.label}
      <span class="count">${s.projectCount}</span>
    </button>`).join('');

  // Project grid — each card navigates to the project page
  const projects = semData.projects.map(p => {
    const count = (p.submissions || []).length;
    return `
    <div class="card project-card card-hover-accent"
         onclick="navigate('project-page','${dept.id}','${semMeta.id}','${p.id}')"
         style="cursor:pointer;">
      <div class="project-thumb">
        <div style="opacity:0.2;">${icon(dept.icon, 32)}</div>
      </div>
      <div class="project-body">
        <p class="project-type">${p.type}</p>
        <p class="project-title">${p.title}</p>
        <p class="project-desc">${p.desc}</p>
        <span class="project-link-badge" style="margin-top:6px;">
          ${icon('arrow', 13)} ${count} submission${count !== 1 ? 's' : ''}
        </span>
      </div>
    </div>`;
  }).join('');

  // Semester resource links
  const resourceLinks = semData.links || [];
  const linkCards = resourceLinks.map(l => `
    <a href="${l.url}" target="_blank" rel="noopener" class="card link-card card-hover-accent">
      <div class="link-icon">${icon(l.icon)}</div>
      <div style="flex:1;min-width:0;">
        <h4>${l.label}</h4>
        <p>${l.desc}</p>
      </div>
      <div style="color:var(--text-3);flex-shrink:0;">${ICONS.external}</div>
    </a>`).join('');

  const accentBarColor = dept.colorToken === 'yellow' ? 'var(--yellow)' : 'var(--accent)';
  const projectCount = semData.projects.length;

  return `
  <div class="container">
    <div class="class-page-layout">
      <aside class="sidebar">
        <button class="sidebar-back" onclick="navigate('student-work')">
          ${ICONS.back} All Classes
        </button>
        <p class="sidebar-section-label">Department</p>
        ${deptLinks}
        <p class="sidebar-section-label" style="margin-top:20px;">Semesters</p>
        ${sidebarSemLinks}
      </aside>
      <div class="class-main">
        <div class="class-main-header">
          <div class="tags">
            <span class="tag ${dept.tagClass}">${dept.label}</span>
            <span class="tag tag-slate">${semMeta.label}</span>
            ${semMeta.current ? '<span class="tag tag-yellow">Current</span>' : ''}
          </div>
          <h1>${dept.label}</h1>
          <p class="muted">${semMeta.label} &nbsp;·&nbsp; ${projectCount} student project${projectCount !== 1 ? 's' : ''}</p>
        </div>
        <div class="section-heading">
          <div class="section-heading-bar" style="background:${accentBarColor};"></div>
          Project Gallery
        </div>
        <div class="project-grid">${projects}</div>
        ${resourceLinks.length > 0 ? `
        <div class="section-heading" style="margin-top:8px;">
          <div class="section-heading-bar" style="background:var(--border-dark);"></div>
          Semester Resources
        </div>
        <div class="link-grid" style="margin-bottom:72px;">${linkCards}</div>
        ` : ''}
      </div>
    </div>
  </div>`;
}

/* ====================================================================
   PROJECT PAGE — shows all student submissions for one project
==================================================================== */
function renderProjectPage(dept, semMeta, project) {
  const { departments } = DATA.studentwork;
  const submissions = project.submissions || [];

  // Sidebar: department switcher
  const deptLinks = departments.map(d => `
    <button class="sidebar-link ${d.id === dept.id ? 'active' : ''}"
            onclick="navigate('class-page','${d.id}',null)">
      <span class="sidebar-dept-icon">${icon(d.icon, 18)}</span>
      ${d.shortLabel}
    </button>`).join('');

  // Sidebar: semester switcher
  const sidebarSemLinks = dept.semesters.map(s => `
    <button class="sidebar-link ${s.id === semMeta.id ? 'active' : ''}"
            onclick="navigate('class-page','${dept.id}','${s.id}')">
      ${s.current ? '<span class="sem-dot"></span>' : ''}
      ${s.label}
      <span class="count">${s.projectCount}</span>
    </button>`).join('');

  // Submission grid
  const submissionCards = submissions.map(s => {
    const thumbContent = s.thumb
      ? `<img src="${s.thumb}" alt="${s.title}" loading="lazy"/>`
      : `<div style="opacity:0.2;">${icon(dept.icon, 28)}</div>`;

    if (s.url) {
      return `
      <a href="${s.url}" target="_blank" rel="noopener" class="submission-card">
        <div class="submission-thumb">${thumbContent}</div>
        <div class="submission-body">
          <p class="submission-student">${s.student}</p>
          <p class="submission-title">${s.title}</p>
          <span class="submission-link">${ICONS.external} View work</span>
        </div>
      </a>`;
    }
    return `
    <div class="submission-card">
      <div class="submission-thumb">${thumbContent}</div>
      <div class="submission-body">
        <p class="submission-student">${s.student}</p>
        <p class="submission-title">${s.title}</p>
        <span class="submission-no-link">Not yet published</span>
      </div>
    </div>`;
  }).join('');

  const accentBarColor = dept.colorToken === 'yellow' ? 'var(--yellow)' : 'var(--accent)';

  return `
  <div class="container">
    <div class="class-page-layout">

      <aside class="sidebar">
        <button class="sidebar-back" onclick="navigate('class-page','${dept.id}','${semMeta.id}')">
          ${ICONS.back} Back to ${dept.shortLabel}
        </button>
        <p class="sidebar-section-label">Department</p>
        ${deptLinks}
        <p class="sidebar-section-label" style="margin-top:20px;">Semesters</p>
        ${sidebarSemLinks}
      </aside>

      <div class="class-main">
        <div class="class-main-header">
          <div class="tags">
            <span class="tag ${dept.tagClass}">${dept.label}</span>
            <span class="tag tag-slate">${semMeta.label}</span>
            ${semMeta.current ? '<span class="tag tag-yellow">Current</span>' : ''}
          </div>
          <h1>${project.title}</h1>
          <p class="muted" style="margin-bottom:12px;">${project.type} &nbsp;·&nbsp; ${submissions.length} submission${submissions.length !== 1 ? 's' : ''}</p>
          <p style="font-size:15px;color:var(--text-2);line-height:1.65;max-width:580px;">${project.desc}</p>
        </div>

        <div class="section-heading" style="margin-top:32px;">
          <div class="section-heading-bar" style="background:${accentBarColor};"></div>
          Student Submissions
        </div>
        <div class="submission-grid">${submissionCards}</div>
      </div>

    </div>
  </div>`;
}

/* ====================================================================
   SANDBOX
==================================================================== */
function renderSandbox() {
  const { tools } = DATA.sandbox;
  const tagMap = { CSS: 'tag-navy', JS: 'tag-yellow', Design: 'tag-navy', Dev: 'tag-slate', AI: 'tag-slate' };

  const cards = tools.map(t => {
    const cardInner = `
    <div class="sandbox-card-top">
      <div class="sandbox-icon">${icon(t.icon)}</div>
      <span class="tag ${tagMap[t.tag] || 'tag-slate'}">${t.tag}</span>
    </div>
    <h3>${t.title}</h3>
    <p>${t.desc}</p>
    <span class="sandbox-open">Open tool ${ICONS.arrow}</span>`;

    return t.url
      ? `<a href="${t.url}" target="_blank" rel="noopener" class="card sandbox-card card-hover-accent">${cardInner}</a>`
      : `<div class="card sandbox-card" style="cursor:default;">${cardInner.replace(`<span class="sandbox-open">Open tool ${ICONS.arrow}</span>`, '<span class="sandbox-open" style="color:var(--text-3);">Coming soon</span>')}</div>`;
  }).join('');

  return `
  <div class="container">
    <div class="page-header">
      <p class="section-eyebrow">Interactive tools</p>
      <h1>The Sandbox</h1>
      <p class="muted">Tools, experiments, and interactive demos for class. Click any card to open.</p>
    </div>
    <div class="sandbox-grid" style="padding-bottom:72px;">${cards}</div>
  </div>`;
}

/* ====================================================================
   RESOURCES
==================================================================== */
function renderResources() {
  const { categories } = DATA.resources;

  const sections = categories.map(cat => {
    const items = cat.items.map(r => `
      <a href="${r.url}" target="_blank" rel="noopener" class="card resource-card card-hover-accent">
        <div class="resource-icon">${icon(r.icon)}</div>
        <div style="flex:1;min-width:0;">
          <h4>${r.name}</h4>
          <p>${r.desc}</p>
        </div>
        <div style="color:var(--text-3);flex-shrink:0;">${ICONS.external}</div>
      </a>`).join('');

    return `
    <div class="resources-section">
      <div class="resources-section-header">
        <div class="resources-section-icon">${icon(cat.icon, 18)}</div>
        <h2>${cat.label}</h2>
      </div>
      <p class="resources-desc">${cat.desc}</p>
      <div class="resource-grid">${items}</div>
    </div>`;
  }).join('');

  return `
  <div class="container">
    <div class="page-header">
      <p class="section-eyebrow">Curated directory</p>
      <h1>Resources</h1>
      <p class="muted">Design, dev, and AI tools curated across all three disciplines.</p>
    </div>
    <div style="padding-bottom:72px;">${sections}</div>
  </div>`;
}

/* ====================================================================
   ABOUT
==================================================================== */
function renderAbout() {
  const { bio, contact } = DATA.about;
  const { departments } = DATA.studentwork;

  const bioParagraphs = bio.map(p => `<p>${p}</p>`).join('');

  const classCards = departments.map(dept => `
    <div class="about-class-card">
      <div class="about-class-icon">${icon(dept.icon, 18)}</div>
      <h3>${dept.label}</h3>
      <p>${dept.description}</p>
    </div>`).join('');

  return `
  <div class="container">
    <div class="about-layout">
      <span class="tag tag-navy" style="margin-bottom:20px;display:inline-block;">About</span>
      <h1>Teaching tech,<br><span class="hl">one build at a time.</span></h1>
      <div class="about-body">${bioParagraphs}</div>
      <div class="about-classes">${classCards}</div>
      <div class="about-contact">
        <div>
          <h3>Get in touch</h3>
          <p class="muted">${contact.tagline}</p>
        </div>
        <a href="mailto:${contact.email}?subject=${encodeURIComponent(contact.emailSubject)}"
           class="btn btn-accent">
          Send an Email ${ICONS.arrow}
        </a>
      </div>
    </div>
  </div>`;
}

/* ====================================================================
   MOBILE NAV
==================================================================== */
function toggleMobileNav() {
  document.getElementById('mobile-nav').classList.toggle('open');
}
function closeMobileNav() {
  document.getElementById('mobile-nav').classList.remove('open');
}

/* ====================================================================
   BOOT — load all JSON, then render
==================================================================== */
document.addEventListener('DOMContentLoaded', async () => {
  const ok = await loadAllData();
  if (!ok) return;

  // Set initial theme icon now that icons are available
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.getElementById('theme-btn').innerHTML = isDark ? ICONS.moon : ICONS.sun;

  navigate('home');
});
</script>
