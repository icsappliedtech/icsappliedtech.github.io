<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mr Jason Code</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    /* ============================================
       THEME TOKENS
       8  — Chalk + Deep Navy  (light)
       D1 — Deep Navy Dark     (dark)
    ============================================ */

    :root, [data-theme="light"] {
      --bg:          #FAFBFC;
      --surface:     #FFFFFF;
      --surface-2:   #EEF1F5;
      --border:      #D9DFE8;
      --border-dark: #BCC5D3;
      --text:        #0B1320;
      --text-2:      #3D4F68;
      --text-3:      #8496AE;
      --accent:      #1A3A6B;
      --accent-dark: #0F2347;
      --accent-light:#E8EFF8;
      --accent-mid:  #C5D5EA;
      --yellow:      #FFCB47;
      --yellow-light:#FFF6D6;
    }

    [data-theme="dark"] {
      --bg:          #0B1320;
      --surface:     #111D2E;
      --surface-2:   #1A2C42;
      --border:      #1E3250;
      --border-dark: #2A4468;
      --text:        #E8EDF5;
      --text-2:      #9AAEC8;
      --text-3:      #4D6884;
      --accent:      #4D87D6;
      --accent-dark: #3A70BE;
      --accent-light:#0F2347;
      --accent-mid:  #1A3A6B;
      --yellow:      #FFCB47;
      --yellow-light:#2A2000;
    }

    /* ============================================
       RESET & BASE
    ============================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }

    body {
      font-family: 'Noto Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
      transition: background 0.25s ease, color 0.25s ease;
    }

    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; font-family: inherit; border: none; background: none; }

    /* ============================================
       LAYOUT
    ============================================ */
    .container { max-width: 1140px; margin: 0 auto; padding: 0 28px; }

    /* ============================================
       TYPOGRAPHY
    ============================================ */
    .font-display { font-family: 'Inter', sans-serif; }
    .muted  { color: var(--text-2); }
    .subtle { color: var(--text-3); }
    .accent { color: var(--accent); }
    .yellow { color: var(--yellow); }

    /* ============================================
       BADGES / TAGS
    ============================================ */
    .tag {
      display: inline-flex;
      align-items: center;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 100px;
      line-height: 1.6;
    }
    .tag-navy   { background: var(--accent-light); color: var(--accent); }
    .tag-yellow { background: var(--yellow-light);  color: #7A5800; }
    .tag-slate  { background: var(--surface-2);     color: var(--text-2); }

    [data-theme="dark"] .tag-yellow { color: var(--yellow); }

    /* ============================================
       BUTTONS
    ============================================ */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 600;
      padding: 11px 22px;
      border-radius: 10px;
      transition: all 0.18s ease;
      white-space: nowrap;
      border: 2px solid transparent;
    }
    .btn-primary {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }
    .btn-primary:hover { background: var(--accent); border-color: var(--accent); color: #fff; }

    .btn-outline {
      background: transparent;
      color: var(--text-2);
      border-color: var(--border-dark);
    }
    .btn-outline:hover { border-color: var(--text); color: var(--text); }

    .btn-accent {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .btn-accent:hover { background: var(--accent-dark); border-color: var(--accent-dark); }

    /* ============================================
       CARD
    ============================================ */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      transition: box-shadow 0.18s ease, transform 0.18s ease, border-color 0.18s ease;
    }
    .card:hover {
      box-shadow: 0 6px 24px rgba(11,19,32,0.10);
      transform: translateY(-2px);
      border-color: var(--border-dark);
    }
    [data-theme="dark"] .card:hover {
      box-shadow: 0 6px 24px rgba(0,0,0,0.35);
    }
    .card-hover-accent:hover { border-color: var(--accent-mid); }

    /* ============================================
       SECTION EYEBROW
    ============================================ */
    .section-eyebrow {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 10px;
    }
    .section-eyebrow::before {
      content: '';
      display: inline-block;
      width: 18px;
      height: 2px;
      background: var(--yellow);
      border-radius: 2px;
    }

    /* ============================================
       DIVIDER
    ============================================ */
    hr.divider { border: none; border-top: 1px solid var(--border); margin: 0; }

    /* ============================================
       FADE IN
    ============================================ */
    .fade-in { animation: fadeUp 0.3s ease both; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ============================================
       ANNOUNCEMENT BAR
    ============================================ */
    .announcement-bar {
      background: var(--accent);
      color: #fff;
      text-align: center;
      padding: 9px 20px;
      font-size: 13px;
      font-weight: 500;
    }
    [data-theme="dark"] .announcement-bar { background: var(--surface-2); color: var(--text); }
    .announcement-bar a {
      color: var(--yellow);
      margin-left: 8px;
      font-weight: 600;
      text-decoration: underline;
    }
    .announcement-bar a:hover { opacity: 0.85; }

    /* ============================================
       NAV
    ============================================ */
    .nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      transition: background 0.25s ease, border-color 0.25s ease;
    }
    .nav-inner {
      max-width: 1140px;
      margin: 0 auto;
      padding: 0 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      gap: 16px;
    }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Inter', sans-serif;
      font-weight: 800;
      font-size: 17px;
      letter-spacing: -0.02em;
      color: var(--text);
      transition: color 0.18s ease;
      flex-shrink: 0;
    }
    .nav-logo:hover { color: var(--accent); }
    .nav-logo-mark {
      width: 32px; height: 32px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 800;
      font-family: 'Inter', sans-serif;
      color: #fff;
      flex-shrink: 0;
      transition: background 0.25s ease;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 2px;
      list-style: none;
    }
    .nav-links button {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-2);
      padding: 7px 13px;
      border-radius: 8px;
      transition: background 0.18s ease, color 0.18s ease;
    }
    .nav-links button:hover { background: var(--surface-2); color: var(--text); }
    .nav-links button.nav-active {
      background: var(--accent-light);
      color: var(--accent);
      font-weight: 600;
    }

    /* Dark mode toggle */
    .theme-toggle {
      width: 36px; height: 36px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-2);
      background: var(--surface-2);
      border: 1px solid var(--border);
      transition: all 0.18s ease;
      flex-shrink: 0;
      font-size: 16px;
    }
    .theme-toggle:hover { border-color: var(--border-dark); color: var(--text); }

    .nav-contact {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-2);
      background: var(--surface-2);
      border: 1px solid var(--border-dark);
      padding: 8px 16px;
      border-radius: 10px;
      transition: all 0.18s ease;
      white-space: nowrap;
    }
    .nav-contact:hover { background: var(--text); color: var(--bg); border-color: var(--text); }

    .nav-mobile-btn {
      display: none;
      padding: 8px;
      border-radius: 8px;
      color: var(--text);
    }
    .nav-mobile-btn:hover { background: var(--surface-2); }
    .nav-mobile-btn svg { width: 20px; height: 20px; }

    .mobile-nav {
      display: none;
      border-top: 1px solid var(--border);
      background: var(--surface);
      padding: 10px 16px 14px;
      flex-direction: column;
      gap: 2px;
    }
    .mobile-nav.open { display: flex; }
    .mobile-nav button {
      text-align: left;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-2);
      padding: 10px 12px;
      border-radius: 8px;
      transition: background 0.18s ease, color 0.18s ease;
    }
    .mobile-nav button:hover { background: var(--surface-2); color: var(--text); }

    /* ============================================
       HOME
    ============================================ */
    .hero { padding: 72px 0 56px; }

    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 20px;
    }
    .hero-eyebrow::before {
      content: '';
      display: inline-block;
      width: 6px; height: 6px;
      background: var(--yellow);
      border-radius: 50%;
    }

    .hero h1 {
      font-family: 'Inter', sans-serif;
      font-weight: 800;
      font-size: clamp(44px, 7vw, 72px);
      line-height: 1.02;
      letter-spacing: -0.025em;
      color: var(--text);
      margin-bottom: 22px;
    }
    .hero h1 .hl { color: var(--accent); }

    .hero-body {
      font-size: 17px;
      color: var(--text-2);
      line-height: 1.7;
      max-width: 560px;
      margin-bottom: 36px;
    }
    .hero-cta { display: flex; gap: 12px; flex-wrap: wrap; }

    /* Dept cards */
    .grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    .dept-card {
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      cursor: pointer;
    }
    .dept-card-icon {
      font-size: 26px;
      width: 50px; height: 50px;
      background: var(--surface-2);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.18s ease;
    }
    .dept-card:hover .dept-card-icon { background: var(--accent-light); }
    .dept-card h3 {
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 20px;
      color: var(--text);
    }
    .dept-card p { font-size: 14px; color: var(--text-2); line-height: 1.6; flex: 1; }
    .dept-card-link {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
    }

    .quick-link-card {
      padding: 22px 24px;
      display: flex;
      align-items: center;
      gap: 18px;
      cursor: pointer;
    }
    .quick-link-icon {
      width: 46px; height: 46px;
      background: var(--surface-2);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      transition: background 0.18s ease;
    }
    .quick-link-card:hover .quick-link-icon { background: var(--accent-light); }
    .quick-link-card h4 { font-size: 15px; font-weight: 600; margin-bottom: 3px; }
    .quick-link-card p  { font-size: 13px; color: var(--text-2); }

    /* ============================================
       PAGE HEADER
    ============================================ */
    .page-header { padding: 52px 0 40px; }
    .page-header h1 {
      font-family: 'Inter', sans-serif;
      font-weight: 800;
      font-size: clamp(34px, 5vw, 52px);
      letter-spacing: -0.025em;
      margin-bottom: 12px;
    }
    .page-header p { font-size: 16px; color: var(--text-2); max-width: 520px; }

    /* ============================================
       STUDENT WORK HUB
    ============================================ */
    .sw-dept-card { border-radius: 16px; overflow: hidden; display: flex; flex-direction: column; }
    .sw-dept-header { padding: 24px 24px 18px; display: flex; align-items: center; gap: 12px; }
    .sw-dept-body { padding: 0 16px 16px; flex: 1; display: flex; flex-direction: column; }
    .sw-sem-btn {
      width: 100%; text-align: left;
      padding: 11px 12px;
      border-radius: 8px;
      font-size: 14px; font-weight: 500;
      color: var(--text-2);
      display: flex; justify-content: space-between; align-items: center;
      transition: background 0.18s ease, color 0.18s ease;
      margin-bottom: 3px;
    }
    .sw-sem-btn:hover { background: var(--accent-light); color: var(--accent); }
    .sw-sem-btn .count { font-size: 12px; color: var(--text-3); }
    .sw-dept-footer { padding: 12px 16px 16px; }
    .sw-dept-footer button {
      width: 100%; padding: 10px;
      border-radius: 10px;
      font-size: 13px; font-weight: 600;
      background: var(--text); color: var(--bg);
      transition: background 0.18s ease;
    }
    .sw-dept-footer button:hover { background: var(--accent); }

    /* ============================================
       CLASS PAGE
    ============================================ */
    .class-page-layout {
      display: flex; gap: 32px;
      padding: 40px 0 72px;
      align-items: flex-start;
    }
    .sidebar { width: 230px; flex-shrink: 0; position: sticky; top: 80px; }
    .sidebar-back {
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; font-weight: 500;
      color: var(--text-3);
      margin-bottom: 24px;
      transition: color 0.18s ease;
    }
    .sidebar-back:hover { color: var(--accent); }
    .sidebar-section-label {
      font-size: 10px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text-3);
      padding: 0 10px; margin-bottom: 6px;
    }
    .sidebar-link {
      display: flex; align-items: center; gap: 8px;
      width: 100%; text-align: left;
      padding: 9px 10px;
      border-radius: 8px;
      font-size: 14px; font-weight: 500;
      color: var(--text-2);
      transition: background 0.18s ease, color 0.18s ease;
      margin-bottom: 2px;
    }
    .sidebar-link:hover { background: var(--accent-light); color: var(--accent); }
    .sidebar-link.active { background: var(--accent-light); color: var(--accent); font-weight: 600; }
    .sidebar-link .count { margin-left: auto; font-size: 11px; color: var(--text-3); }
    .sidebar-link.active .count { color: var(--accent); opacity: 0.6; }

    .class-main { flex: 1; min-width: 0; }
    .class-main-header { margin-bottom: 32px; }
    .class-main-header .tags { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
    .class-main-header h1 {
      font-family: 'Inter', sans-serif;
      font-weight: 800;
      font-size: clamp(28px, 4vw, 40px);
      letter-spacing: -0.02em; margin-bottom: 6px;
    }

    .section-heading {
      display: flex; align-items: center; gap: 10px;
      font-size: 16px; font-weight: 600;
      color: var(--text); margin-bottom: 16px;
    }
    .section-heading-bar { width: 4px; height: 20px; border-radius: 2px; flex-shrink: 0; }

    /* Project grid */
    .project-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 16px; margin-bottom: 40px;
    }
    .project-card { display: flex; flex-direction: column; border-radius: 16px; overflow: hidden; cursor: pointer; }
    .project-thumb {
      width: 100%; aspect-ratio: 16/10;
      background: var(--surface-2);
      display: flex; align-items: center; justify-content: center;
      font-size: 30px; position: relative; overflow: hidden;
    }
    .project-thumb::after {
      content: ''; position: absolute; inset: 0;
      background: var(--accent); opacity: 0;
      transition: opacity 0.18s ease;
    }
    .project-card:hover .project-thumb::after { opacity: 0.07; }
    .project-body { padding: 14px; flex: 1; display: flex; flex-direction: column; gap: 4px; }
    .project-type { font-size: 10px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text-3); }
    .project-title { font-size: 14px; font-weight: 600; color: var(--text); line-height: 1.35; }
    .project-student { font-size: 12px; color: var(--accent); font-weight: 500; }
    .project-desc { font-size: 12px; color: var(--text-2); line-height: 1.5; margin-top: 3px; }

    /* Link grid */
    .link-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 10px; }
    .link-card {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px; border-radius: 12px; cursor: pointer;
    }
    .link-icon {
      width: 40px; height: 40px;
      background: var(--surface-2); border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
      transition: background 0.18s ease;
    }
    .link-card:hover .link-icon { background: var(--accent-light); }
    .link-card h4 { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
    .link-card p  { font-size: 12px; color: var(--text-2); }

    /* ============================================
       SANDBOX
    ============================================ */
    .sandbox-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 16px; }
    .sandbox-card { padding: 24px; display: flex; flex-direction: column; gap: 12px; cursor: pointer; }
    .sandbox-icon {
      width: 48px; height: 48px; background: var(--surface-2);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; transition: background 0.18s ease;
    }
    .sandbox-card:hover .sandbox-icon { background: var(--accent-light); }
    .sandbox-card h3 { font-size: 15px; font-weight: 600; }
    .sandbox-card p  { font-size: 13px; color: var(--text-2); line-height: 1.55; flex: 1; }
    .sandbox-open { font-size: 12px; font-weight: 600; color: var(--accent); }

    /* ============================================
       RESOURCES
    ============================================ */
    .resources-section { margin-bottom: 52px; }
    .resources-section h2 {
      font-family: 'Inter', sans-serif;
      font-weight: 700; font-size: 22px; margin-bottom: 6px;
    }
    .resources-section .desc { font-size: 14px; color: var(--text-2); margin-bottom: 18px; }
    .resource-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 10px; }
    .resource-card {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px; border-radius: 12px; cursor: pointer;
    }
    .resource-icon {
      width: 44px; height: 44px; background: var(--surface-2);
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0; transition: background 0.18s ease;
    }
    .resource-card:hover .resource-icon { background: var(--accent-light); }
    .resource-card h4 { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
    .resource-card p  { font-size: 12px; color: var(--text-2); }

    /* ============================================
       ABOUT
    ============================================ */
    .about-layout { max-width: 680px; padding: 52px 0 72px; }
    .about-layout h1 {
      font-family: 'Inter', sans-serif;
      font-weight: 800;
      font-size: clamp(34px, 5vw, 50px);
      letter-spacing: -0.025em; line-height: 1.05; margin-bottom: 28px;
    }
    .about-layout h1 .hl { color: var(--accent); }
    .about-body { display: flex; flex-direction: column; gap: 18px; margin-bottom: 40px; }
    .about-body p { font-size: 15px; color: var(--text-2); line-height: 1.75; }
    .about-classes { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 40px; }
    .about-class-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 20px;
    }
    .about-class-card .icon { font-size: 22px; margin-bottom: 10px; }
    .about-class-card h3 { font-size: 14px; font-weight: 700; margin-bottom: 5px; }
    .about-class-card p  { font-size: 13px; color: var(--text-2); }
    .about-contact {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 24px 28px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 20px; flex-wrap: wrap;
    }
    .about-contact h3 { font-size: 16px; font-weight: 600; margin-bottom: 3px; }
    .about-contact p  { font-size: 14px; color: var(--text-2); }

    /* ============================================
       FOOTER
    ============================================ */
    .footer {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 28px 0;
      transition: background 0.25s ease, border-color 0.25s ease;
    }
    .footer-inner {
      max-width: 1140px; margin: 0 auto; padding: 0 28px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 20px; flex-wrap: wrap;
    }
    .footer-brand { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 14px; }
    .footer-brand .mark {
      width: 22px; height: 22px; background: var(--accent); border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; font-weight: 800; color: #fff;
      font-family: 'Inter', sans-serif;
      transition: background 0.25s ease;

/* ====================================================
   THEME
==================================================== */
const btn = document.getElementById('theme-btn');

function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  btn.textContent = isDark ? '☀️' : '🌙';
  localStorage.setItem('mjc-theme', isDark ? 'light' : 'dark');
}

// Restore saved theme
(function() {
  const saved = localStorage.getItem('mjc-theme');
  if (saved === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
    btn.textContent = '🌙';
  }
})();

/* ====================================================
   ROUTER
==================================================== */
let route       = 'home';
let activeClass = 'digital-media';
let activeSem   = null;

function navigate(r, classId, semId) {
  route = r;
  if (classId !== undefined) activeClass = classId;
  if (semId   !== undefined) activeSem   = semId;
  document.querySelectorAll('[data-nav]').forEach(b => {
    b.classList.remove('nav-active');
    const match = r === 'class-page' ? 'student-work' : r;
    if (b.dataset.nav === match) b.classList.add('nav-active');
  });
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
